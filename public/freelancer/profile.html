<!DOCTYPE html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Freelancer Profile</title><link rel="stylesheet" href="/css/main.css" /></head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Edit Profile</h1>
        <form id="profile-form" class="grid">
          <label>Full Name <input name="full_name" /></label>
          <label>Bio <textarea name="bio"></textarea></label>
          <label>Skills <input name="skills" /></label>
          <label>Portfolio URL <input name="portfolio_url" /></label>
          <button type="submit">Save</button>
        </form>
        <pre id="result"></pre>
      </section>
    </main>
    <script type="module" src="/js/freelancer.js"></script>
  </body>
</html>
